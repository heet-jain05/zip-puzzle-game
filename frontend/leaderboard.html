<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zip Pro | Hall of Fame</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

    body {
      height: 100vh;
      margin: 0;
      background: #05070a;
      color: white;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .glass-container {
      background: #0f1117;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2.5rem;
      width: 100%;
      max-width: 950px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
    }

    .header-row {
      display: grid;
      grid-template-columns: 100px 1fr 140px 140px 100px;
      background: rgba(255, 255, 255, 0.03);
      padding: 1.25rem 1rem;
      border-radius: 1.5rem;
      margin-bottom: 0.5rem;
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    #list {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    #list::-webkit-scrollbar {
      width: 6px;
    }

    #list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    .score-row {
      display: grid;
      grid-template-columns: 100px 1fr 140px 140px 100px;
      align-items: center;
      padding: 1.5rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .rank-1 {
      background: linear-gradient(90deg, rgba(251, 191, 36, 0.05) 0%, transparent 100%);
    }

    .rank-2 {
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.05) 0%, transparent 100%);
    }

    .rank-3 {
      background: linear-gradient(90deg, rgba(248, 113, 113, 0.05) 0%, transparent 100%);
    }

    .medal {
      width: 36px;
      height: 36px;
    }

    .player-name {
      color: #38bdf8;
      font-weight: 900;
      font-size: 1.1rem;
      text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
    }

    .time-val {
      color: #4ade80;
      font-weight: 900;
      text-align: right;
    }

    .bt-val {
      color: #fb7185;
      text-align: center;
      font-weight: 800;
    }

    .grid-val {
      color: #64748b;
      font-size: 0.85rem;
      text-align: center;
      font-weight: 700;
      font-family: monospace;
    }

    .btn-back {
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.75rem 2rem;
      border-radius: 1rem;
      font-size: 0.7rem;
      font-weight: 900;
      color: #f1f5f9;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: 0.3s;
    }
  </style>
</head>

<body>
  <div class="w-full max-w-5xl p-8 animate__animated animate__fadeIn">
    <div class="flex justify-between items-end mb-10 px-4">
      <div>
        <h1 class="text-7xl font-black italic tracking-tighter text-white leading-tight whitespace-nowrap">
          TEST
          <span class="inline-block text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 px-2 pb-4">
            IQ
          </span>
        </h1>
        <p class="text-[10px] text-blue-500/80 font-black uppercase tracking-[0.4em] mt-1 ml-1">
          Sharpen your focus. Outsmart the grid.
        </p>
      </div>
      <a href="index.html" class="btn-back">Back to Game</a>
    </div>
    <div class="glass-container">
      <div class="header-row">
        <div>Rank</div>
        <div>Player</div>
        <div class="text-center">Grid Size</div>
        <div class="text-center">Backtracks</div>
        <div class="text-right">Time</div>
      </div>
      <div id="list"></div>
    </div>
  </div>
  <script>
    async function loadData() {
      try {
        const res = await fetch("http://127.0.0.1:8000/leaderboard");
        const data = await res.json();
        const list = document.getElementById("list");
        if (!data || data.length === 0) {
          list.innerHTML = `<div class="p-32 text-center text-slate-700 font-black text-sm tracking-widest uppercase italic">Table is Empty</div>`;
          return;
        }
        list.innerHTML = data.map((r, i) => {
          let rankDisplay = `<span class="text-2xl font-black text-slate-800 ml-2">#${i + 1}</span>`;
          let rankClass = "";
          if (i === 0) { rankDisplay = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583344.png" class="medal">`; rankClass = "rank-1"; }
          else if (i === 1) { rankDisplay = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583319.png" class="medal">`; rankClass = "rank-2"; }
          else if (i === 2) { rankDisplay = `<img src="https://cdn-icons-png.flaticon.com/512/2583/2583434.png" class="medal">`; rankClass = "rank-3"; }
          return `<div class="score-row ${rankClass}"><div class="flex items-center">${rankDisplay}</div><div class="player-name uppercase">${r.name}</div><div class="grid-val">${r.grid}</div><div class="bt-val text-lg">${r.backtracks}</div><div class="time-val text-2xl">${r.time}</div></div>`;
        }).join("");
      } catch (e) { document.getElementById("list").innerHTML = `<div class="p-20 text-center text-rose-500 font-black">DATABASE DISCONNECTED</div>`; }
    }
    loadData();
  </script>
</body>

</html>
